name: Build and Zip Android SDK

on:
  push:
  pull_request:
  workflow_dispatch:  

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install zip if not installed
      run: sudo apt update && sudo apt install zip -y

    - name: Zip Android SDK
      run: |
        cd /usr/local/lib/android/
        zip -r android-sdk.zip sdk/

    - name: Upload Android SDK Zip
      uses: actions/upload-artifact@v4
      with:
        name: android-sdk-zip
        path: android-sdk.zip

    - name: Create Release
      id: create_release
      uses: ncipollo/release-action@v1
      with:
        tag: "sdk-2024"
        name: "android-sdk"
        body: 'body'
        artifacts: /usr/local/lib/android/android-sdk.zip
